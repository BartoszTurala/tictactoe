name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build JAR & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build executable JAR
        run: mvn -B clean package

      - name: Compute release tag
        id: tag
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "tag=build-${{ github.run_number }}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Upload JAR as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tictactoe-jar
          path: target/tictactoe.jar
          if-no-files-found: error

      - name: Publish GitHub release with JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: TicTacToe ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: target/tictactoe.jar
